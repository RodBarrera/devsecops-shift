{% extends "base.html" %}
{% block content %}
<div class="card">
  <p class="muted">{{ motd }}</p>
</div>

<div class="card">
  <h2>Nueva nota</h2>
  <form method="post" action="{{ url_for('new_note') }}">
    <label>Título</label>
    <input type="text" name="title">
    <label>Contenido</label>
    <textarea name="body" rows="3"></textarea>
    <button type="submit">Guardar</button>
  </form>
</div>

<h2>Tus notas</h2>
{% for note in notes %}
  <div class="card">
    <strong>{{ note['title'] }}</strong>
    <p class="muted">{{ note['body'][:80] }}</p>
    <a href="{{ url_for('view_note', note_id=note['id']) }}">Ver nota #{{ note['id'] }} →</a>
  </div>
{% else %}
  <p class="muted">Todavía no tienes notas.</p>
{% endfor %}

<div class="card">
  <h2>Diagnóstico de red</h2>
  <form method="get" action="{{ url_for('ping') }}">
    <label>Host a comprobar</label>
    <input type="text" name="host" value="127.0.0.1">
    <button type="submit">Ping</button>
  </form>
</div>
{% endblock %}
